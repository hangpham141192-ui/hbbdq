<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday Quân ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<!-- Trái tim bay -->
<div id="hearts"></div>

<!-- Hoa rơi -->
<div id="flowers"></div>

<!-- Màn hình mở đầu -->
<section id="welcome" class="screen active">

    <div class="gift-box" id="giftBox">
        🎁
    </div>

    <h1>Có một món quà dành cho Quân ❤️</h1>

    <p>Nhấn vào hộp quà để mở</p>

</section>

<!-- Lá thư -->
<section id="letter" class="screen">

    <div class="envelope">

        <div class="paper">

            <h2>🎂 Chúc mừng sinh nhật Quân 🎂</h2>

            <div id="typingText"></div>

            <button id="nextBtn">
                Tiếp tục 🎂
            </button>

        </div>

    </div>

</section>

<!-- Bánh sinh nhật -->
<section id="cakeSection" class="screen">

    <h1>🎂 Happy Birthday 🎂</h1>

    <div class="cake">

        <div class="candle">

            <div class="flame" id="flame"></div>

        </div>

    </div>

    <button id="blowBtn">
        🕯️ Thổi nến
    </button>

</section>

<!-- Kết thúc -->
<section id="final" class="screen">

    <h1>❤️ Happy Birthday Quân ❤️</h1>

    <h2>
        Chúc Quân tuổi mới luôn mạnh khỏe,
        bình an và thật nhiều hạnh phúc.
    </h2>

    <h3>
        Chúc mẹ khỏe ❤️ Con ngoan 👶
    </h3>

</section>

<!-- Nhạc -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Nút nhạc -->
<button id="musicBtn">
    🎵
</button>

<script src="script.js"></script>

</body>
</html>
